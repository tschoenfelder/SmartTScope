# SmartTScope — custom target list
# Format: TOML  (https://toml.io)
# Fields:
#   name        — short identifier used in GoTo and log
#   common_name — display name (optional)
#   ra          — right ascension in decimal hours
#   dec         — declination in decimal degrees (north-positive)
#   type        — star | nebula | galaxy | cluster | planet | satellite
#   tracking    — sidereal | lunar | satellite
#   magnitude   — visual magnitude (optional)
#
# Add or edit targets freely.  The server reloads this file on every request.

