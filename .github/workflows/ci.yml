name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v
        # Real-solver tests (TestAstapSolverUnit, TestRealSolverReplay, etc.)
        # skip automatically on CI because ASTAP and fixture FITS files are absent.
