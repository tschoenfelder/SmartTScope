name: Hardware tests

on:
  workflow_dispatch:

jobs:
  hardware:
    name: Hardware tests (manual trigger only)
    runs-on: ubuntu-latest
    env:
      HW_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Hardware tests
        run: pytest tests/hardware/ -v
