<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTelescope</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --text:         #e6edf3;
      --muted:        #8b949e;
      --accent:       #388bfd;
      --accent-hi:    #58a6ff;
      --success:      #3fb950;
      --warning:      #d29922;
      --danger:       #f85149;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.125rem; font-weight: 600; }
    .pill {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
    }

    /* ── main layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* ── section ── */
    .section {}
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .toolbar h2 { font-size: 1rem; font-weight: 600; flex: 1; }

    /* ── buttons ── */
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    button:hover:not(:disabled) { background: var(--accent-hi); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.danger { background: var(--danger); }
    button.danger:hover:not(:disabled) { background: #ff6b63; }
    button.secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover:not(:disabled) { border-color: var(--accent); }

    /* ── status line ── */
    .status-line {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      min-height: 1.25rem;
    }
    .status-line.error { color: var(--danger); }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 600;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: var(--success); }
    .dot-yellow { background: var(--warning); }
    .dot-red    { background: var(--danger);  }
    .dot-grey   { background: var(--muted);   }

    /* ── state badge ── */
    .state-badge {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-left: auto;
    }
    .state-parked   { background: rgba(139,148,158,0.15); color: var(--muted); }
    .state-unparked { background: rgba(210,153,34,0.15);  color: var(--warning); }
    .state-tracking { background: rgba(63,185,80,0.15);   color: var(--success); }
    .state-slewing  { background: rgba(56,139,253,0.15);  color: var(--accent-hi); }
    .state-unknown  { background: rgba(139,148,158,0.15); color: var(--muted); }
    .state-at_limit { background: rgba(248,81,73,0.15);   color: var(--danger); }

    /* ── params grid ── */
    .params {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem 1.5rem;
    }
    .param { display: flex; flex-direction: column; gap: 0.2rem; }
    .param-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .param-value { font-size: 0.875rem; }
    .mono { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 0.8rem; }

    /* ── features ── */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      background: rgba(56,139,253,0.12);
      color: var(--accent-hi);
      border: 1px solid rgba(56,139,253,0.25);
    }

    /* ── controls row ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .controls-spacer { flex: 1; }

    /* ── goto / move row ── */
    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    input[type="number"], input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.4rem 0.65rem;
      width: 9ch;
      outline: none;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }
    label { font-size: 0.8rem; color: var(--muted); }

    /* ── catalog dropdown ── */
    .catalog-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 260px;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .catalog-item {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .catalog-item:hover { background: rgba(56,139,253,0.12); }
    .catalog-item .ci-name { font-weight: 600; min-width: 3.5ch; }
    .catalog-item .ci-common { color: var(--muted); flex: 1; }
    .catalog-item .ci-coords { color: var(--muted); font-size: 0.75rem; font-family: monospace; }

    /* ── nudge buttons ── */
    .nudge-group { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    button.nudge { padding: 0.4rem 0.6rem; font-size: 0.78rem; min-width: 2.8rem; }

    /* ── custom target list ── */
    .star-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.5rem;
    }
    .star-item {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.3rem 0.5rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .star-item:hover { background: rgba(56,139,253,0.12); }
    .star-item .si-name  { font-weight: 600; min-width: 8ch; }
    .star-item .si-common { color: var(--muted); flex: 1; font-size: 0.78rem; }
    .star-item .si-coords { color: var(--muted); font-size: 0.72rem; font-family: monospace; }
    .tracking-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: rgba(139,148,158,0.15);
      color: var(--muted);
    }
    .tracking-sidereal { background: rgba(63,185,80,0.1);  color: var(--success); }
    .tracking-lunar    { background: rgba(210,153,34,0.1); color: var(--warning); }
    .tracking-satellite{ background: rgba(56,139,253,0.1); color: var(--accent-hi); }

    /* ── camera grid ── */
    .camera-grid { display: grid; gap: 1rem; }

    /* ── preview panel ── */
    .preview-frame {
      position: relative;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-frame img {
      max-width: 100%;
      display: block;
    }
    .preview-placeholder {
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }
    .preview-overlay {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      font-family: ui-monospace, monospace;
    }
    .ws-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .ws-live       { background: var(--success); }
    .ws-connecting { background: var(--warning); animation: pulse 1s ease infinite; }
    .ws-stopped    { background: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── histogram canvas ── */
    .preview-histogram {
      position: absolute;
      bottom: 4px;
      right: 4px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0.85;
    }

    /* ── spinner ── */
    .spin {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>SmartTelescope</h1>
  <span class="pill">v0.1</span>
  <span class="controls-spacer" style="flex:1"></span>
  <button id="connect-all-btn" onclick="connectAll()" style="font-size:0.8rem">
    Connect All
  </button>
</header>

<main>

  <!-- ── Mount ──────────────────────────────────────────────────────────── -->
  <section class="section" id="mount-section">
    <div class="toolbar">
      <h2>Mount</h2>
      <button onclick="refreshMount()">Refresh</button>
    </div>
    <div id="mount-status" class="status-line"></div>
    <div id="mount-card"></div>
  </section>

  <!-- ── Sky Shot ──────────────────────────────────────────────────────── -->
  <section class="section" id="skyshot-section">
    <div class="toolbar">
      <h2>Sky Shot</h2>
    </div>
    <div id="skyshot-status" class="status-line"></div>
    <div class="card">
      <div class="card-title">
        <span class="dot dot-grey" id="skyshot-dot"></span>
        Meridian Sky Position
      </div>
      <div class="params">
        <div class="param">
          <span class="param-label">Target elevation</span>
          <span class="param-value">
            <input type="number" id="skyshot-elevation" value="80" min="60" max="89" step="1"
                   style="width:6ch" oninput="updateElevationLabel()">
            <span id="elevation-label" style="font-size:0.78rem;color:var(--muted)"> °</span>
          </span>
        </div>
        <div class="param">
          <span class="param-label">Computed RA</span>
          <span class="param-value mono" id="skyshot-ra">—</span>
        </div>
        <div class="param">
          <span class="param-label">Computed Dec</span>
          <span class="param-value mono" id="skyshot-dec">—</span>
        </div>
      </div>
      <div class="controls" style="margin-top:1rem;padding-top:0.875rem;border-top:1px solid var(--border)">
        <button id="skyshot-goto-btn" onclick="skyGoto()">GoTo Sky</button>
        <button id="skyshot-snap-btn" onclick="skySnap()" class="secondary" disabled>Snap</button>
        <button id="skyshot-park-btn" onclick="skyPark()" class="secondary">Park after Snap</button>
        <span class="controls-spacer"></span>
        <span id="skyshot-snap-count" style="font-size:0.78rem;color:var(--muted)"></span>
      </div>
      <div class="preview-frame" id="skyshot-frame" style="margin-top:1rem;display:none">
        <div class="preview-placeholder" id="skyshot-placeholder">Snap to capture a frame</div>
        <img id="skyshot-img" alt="" style="display:none">
      </div>
    </div>
  </section>

  <!-- ── Connect All status ─────────────────────────────────────────────── -->
  <section class="section" id="connect-status-section" style="display:none">
    <div class="toolbar"><h2>Connection Status</h2></div>
    <div id="connect-status-grid" class="params"></div>
  </section>

  <!-- ── Focuser ────────────────────────────────────────────────────────── -->
  <section class="section" id="focuser-section">
    <div class="toolbar">
      <h2>Focuser</h2>
      <button onclick="refreshFocuser()">Refresh</button>
    </div>
    <div id="focuser-status" class="status-line"></div>
    <div id="focuser-card"></div>
  </section>

  <!-- ── Custom Targets ──────────────────────────────────────────────── -->
  <section class="section" id="stars-section">
    <div class="toolbar">
      <h2>Custom Targets</h2>
      <button class="secondary" onclick="loadStars()" style="font-size:0.8rem">Reload</button>
    </div>
    <div id="stars-status" class="status-line"></div>
    <div id="stars-list" class="star-list"></div>
  </section>

  <!-- ── Live Preview ─────────────────────────────────────────────────── -->
  <section class="section" id="preview-section">
    <div class="toolbar">
      <h2>Live Preview</h2>
      <span id="preview-camera-label" style="font-size:0.78rem;color:var(--muted);margin-right:0.5rem"></span>
      <button id="preview-split-btn" onclick="previewSplit()"
              style="padding:0.15rem 0.5rem;font-size:0.75rem;margin-right:0.5rem"
              title="Toggle side-by-side dual camera view">Split</button>
      <span id="preview-ws-status" style="font-size:0.8rem;color:var(--muted)">
        <span class="ws-dot ws-stopped"></span>Stopped
      </span>
    </div>
    <div id="preview-status" class="status-line"></div>

    <div id="preview-panels" style="display:flex;gap:0.75rem;align-items:flex-start">
      <!-- Panel A (always visible) -->
      <div id="preview-panel-a" style="flex:1;min-width:0">
        <div class="preview-frame" id="preview-frame">
          <div class="preview-placeholder" id="preview-placeholder">Press Start to begin live preview</div>
          <img id="preview-img" alt="" style="display:none">
          <div class="preview-overlay" id="preview-overlay"></div>
          <canvas id="preview-histogram" class="preview-histogram"
                  width="200" height="60" style="display:none"></canvas>
          <canvas id="preview-hist-decode" width="1" height="1" style="display:none"></canvas>
        </div>
        <div class="controls" style="margin-top:0.5rem;flex-wrap:wrap;gap:0.25rem">
          <label>Cam</label>
          <input type="number" id="preview-cam-idx-a" value="0" min="0" max="7" step="1"
                 style="width:5ch" title="SDK camera index">
          <label style="margin-left:0.4rem">Exp</label>
          <input type="number" id="preview-exposure" value="2" min="0.1" max="60" step="0.5"
                 style="width:7ch">
          <label>s</label>
          <label style="margin-left:0.4rem">Gain</label>
          <input type="number" id="preview-gain" value="100" min="100" max="3200" step="100"
                 style="width:6ch" title="Analog gain: 100 = 1×, 200 = 2×, …">
          <label style="margin-left:0.4rem;display:flex;align-items:center;gap:0.2rem;cursor:pointer">
            <input type="checkbox" id="preview-hist-chk" style="width:auto"
                   onchange="previewHistToggle(this.checked)">Hist
          </label>
          <button id="solve-btn" onclick="solveFrame()"
                  style="margin-left:0.4rem;padding:0.15rem 0.5rem;font-size:0.78rem"
                  title="Plate-solve current frame to get RA/Dec">Solve</button>
          <span id="preview-count" style="font-size:0.78rem;color:var(--muted);margin-left:0.25rem"></span>
        </div>
      </div>

      <!-- Panel B (split mode only, hidden until Split is toggled) -->
      <div id="preview-panel-b" style="flex:1;min-width:0;display:none">
        <div class="preview-frame" id="preview-frame-b">
          <div class="preview-placeholder" id="preview-placeholder-b">Second camera — press Start</div>
          <img id="preview-img-b" alt="" style="display:none">
          <div class="preview-overlay" id="preview-overlay-b"></div>
        </div>
        <div class="controls" style="margin-top:0.5rem;flex-wrap:wrap;gap:0.25rem">
          <label>Cam</label>
          <input type="number" id="preview-cam-idx-b" value="1" min="0" max="7" step="1"
                 style="width:5ch" title="SDK camera index">
          <label style="margin-left:0.4rem">Exp</label>
          <input type="number" id="preview-exposure-b" value="2" min="0.1" max="60" step="0.5"
                 style="width:7ch">
          <label>s</label>
          <label style="margin-left:0.4rem">Gain</label>
          <input type="number" id="preview-gain-b" value="100" min="100" max="3200" step="100"
                 style="width:6ch">
          <span id="preview-count-b" style="font-size:0.78rem;color:var(--muted);margin-left:0.25rem"></span>
        </div>
      </div>
    </div>

    <!-- Plate-solve result -->
    <div id="solve-result" style="display:none;margin-top:0.5rem;padding:0.4rem 0.6rem;
         border-radius:4px;background:var(--surface2);font-size:0.8rem;
         font-family:ui-monospace,monospace;line-height:1.6"></div>

    <!-- Shared start / stop -->
    <div class="controls" style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)">
      <button id="preview-start-btn" onclick="previewStart()">Start</button>
      <button id="preview-stop-btn" class="danger" onclick="previewStop()" disabled>Stop</button>
      <span class="controls-spacer"></span>
    </div>
  </section>

  <!-- ── Cameras ────────────────────────────────────────────────────────── -->
  <section class="section">
    <div class="toolbar">
      <h2>Connected Cameras</h2>
      <button id="scan-btn" onclick="scan()">Scan</button>
    </div>
    <div id="camera-status" class="status-line"></div>
    <div id="camera-grid" class="camera-grid"></div>
  </section>

</main>

<script>
  /* ── app state ────────────────────────────────────────────────────────── */
  let _mountConnected = false;
  let _activeCameraName = '';

  /* ── utilities ─────────────────────────────────────────────────────────── */

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function setStatus(id, msg, isError = false) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status-line' + (isError ? ' error' : '');
  }

  async function apiPost(url, body) {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(text || `Server error ${resp.status}`);
    }
    return resp.json();
  }

  /* ── Mount ─────────────────────────────────────────────────────────────── */

  const _MOUNT_DOT = {
    parked: 'dot-grey', unparked: 'dot-yellow',
    tracking: 'dot-green', slewing: 'dot-green',
    at_limit: 'dot-red', unknown: 'dot-grey',
  };

  function mountCard(data) {
    const state  = data.state || 'unknown';
    const dotCls = _MOUNT_DOT[state] || 'dot-grey';
    const ra  = data.ra  != null ? (+data.ra).toFixed(4)  + ' h'  : '—';
    const dec = data.dec != null ? (+data.dec).toFixed(4) + ' °' : '—';
    const connBadge = _mountConnected
      ? '<span style="font-size:0.68rem;color:var(--success);margin-left:0.4rem">● Connected</span>'
      : '';

    return `
      <div class="card">
        <div class="card-title">
          <span class="dot ${dotCls}"></span>
          OnStep Mount
          <span class="state-badge state-${state}">${state}</span>
          ${connBadge}
        </div>
        <div class="params">
          <div class="param">
            <span class="param-label">RA</span>
            <span class="param-value mono" id="mount-ra">${escHtml(ra)}</span>
          </div>
          <div class="param">
            <span class="param-label">Dec</span>
            <span class="param-value mono" id="mount-dec">${escHtml(dec)}</span>
          </div>
        </div>
        <div class="controls">
          <button class="secondary" onclick="mountAction('unpark')">Unpark</button>
          <button class="secondary" onclick="mountAction('track')">Enable Tracking</button>
          <button class="secondary" onclick="mountAction('disable_tracking')">Disable Tracking</button>
          <span class="controls-spacer"></span>
          <button class="secondary" onclick="mountAction('park')">Park</button>
          <button class="danger" onclick="mountAction('stop')">Stop</button>
        </div>
        <div class="input-row" style="margin-top:0.75rem">
          <label>Target</label>
          <input type="text" id="catalog-query" placeholder="M42, Orion…" style="width:12ch"
                 oninput="catalogSearch()" autocomplete="off">
          <label style="display:flex;align-items:center;gap:0.3rem;cursor:pointer">
            <input type="checkbox" id="catalog-observable" onchange="catalogSearch()">
            <span>Observable</span>
          </label>
          <span id="catalog-results" style="position:relative"></span>
        </div>
        <div class="input-row">
          <label>GoTo RA</label>
          <input type="number" id="goto-ra" step="0.001" placeholder="h" style="width:9ch">
          <label>Dec</label>
          <input type="number" id="goto-dec" step="0.001" placeholder="°" style="width:9ch">
          <button onclick="mountGoto()">GoTo</button>
        </div>
      </div>`;
  }

  async function refreshMount() {
    setStatus('mount-status', '');
    try {
      const data = await (await fetch('/api/mount/status')).json();
      document.getElementById('mount-card').innerHTML = mountCard(data);
    } catch (err) {
      setStatus('mount-status', String(err), true);
    }
  }

  async function runAutofocus() {
    const btn  = document.getElementById('af-btn');
    const res  = document.getElementById('af-result');
    const range_steps = parseInt(document.getElementById('af-range').value, 10);
    const step_size   = parseInt(document.getElementById('af-step').value, 10);
    const exposure    = parseFloat(document.getElementById('af-exposure').value);
    setStatus('focuser-status', '');
    res.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Focusing…';
    try {
      const data = await apiPost('/api/focuser/autofocus', { range_steps, step_size, exposure });
      const method = data.fitted ? 'parabola' : 'argmax';
      const gain   = data.metric_gain >= 0 ? `+${data.metric_gain.toFixed(1)}` : data.metric_gain.toFixed(1);
      res.style.display = 'block';
      res.textContent = `Best: ${data.best_position} steps  |  gain: ${gain}  |  ${method}  |  ${data.positions.length} samples`;
      await refreshFocuser();
    } catch (err) {
      setStatus('focuser-status', `Autofocus failed: ${err}`, true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Autofocus';
    }

  /* ── Live Preview ──────────────────────────────────────────────────────── */

  let _ws         = null;
  let _frameCount = 0;
  let _reconnect  = true;  // false when user explicitly stopped
  let _reconnectTimer = null;

  let _ws2            = null;
  let _frameCount2    = 0;
  let _reconnect2     = true;
  let _reconnectTimer2 = null;
  let _splitActive    = false;

  let _histEnabled  = false;
  let _histDrawing  = false;

  function _setWsStatus(state) {
    // state: 'live' | 'connecting' | 'stopped'
    const labels = { live: 'Live', connecting: 'Connecting…', stopped: 'Stopped' };
    const el = document.getElementById('preview-ws-status');
    el.innerHTML =
      `<span class="ws-dot ws-${state}"></span>${labels[state] || state}`;
  }

  function previewStart() {
    _reconnect = true;
    _connectWs();
    if (_splitActive) {
      _reconnect2 = true;
      _connectWs2();
    }
  }

  function previewStop() {
    _reconnect = false;
    clearTimeout(_reconnectTimer);
    if (_ws) { _ws.close(1000, 'user stop'); _ws = null; }
    _reconnect2 = false;
    clearTimeout(_reconnectTimer2);
    if (_ws2) { _ws2.close(1000, 'user stop'); _ws2 = null; }
    document.getElementById('preview-start-btn').disabled = false;
    document.getElementById('preview-stop-btn').disabled  = true;
    _setWsStatus('stopped');
    setStatus('preview-status', '');
  }

  function previewSplit() {
    _splitActive = !_splitActive;
    const panelB = document.getElementById('preview-panel-b');
    const btn    = document.getElementById('preview-split-btn');
    panelB.style.display = _splitActive ? '' : 'none';
    btn.style.fontWeight = _splitActive ? 'bold' : '';
    if (_splitActive && _ws) {
      // Primary WS is running — also start secondary
      _reconnect2 = true;
      _connectWs2();
    } else if (!_splitActive) {
      // Hide secondary panel and stop its WS
      _reconnect2 = false;
      clearTimeout(_reconnectTimer2);
      if (_ws2) { _ws2.close(1000, 'split off'); _ws2 = null; }
      const img2 = document.getElementById('preview-img-b');
      if (img2.src && img2.src.startsWith('blob:')) URL.revokeObjectURL(img2.src);
      img2.src = '';
      img2.style.display = 'none';
      document.getElementById('preview-placeholder-b').style.display = '';
    }
  }

  function _connectWs() {
    if (_ws) { _ws.close(); _ws = null; }

    const exposure    = parseFloat(document.getElementById('preview-exposure').value) || 2.0;
    const gain        = parseInt(document.getElementById('preview-gain').value, 10) || 100;
    const camIdx      = parseInt(document.getElementById('preview-cam-idx-a').value, 10) || 0;
    const proto       = location.protocol === 'https:' ? 'wss' : 'ws';
    const url         = `${proto}://${location.host}/ws/preview?exposure=${exposure}&gain=${gain}&camera_index=${camIdx}`;

    _setWsStatus('connecting');
    setStatus('preview-status', '');
    document.getElementById('preview-start-btn').disabled = true;
    document.getElementById('preview-stop-btn').disabled  = false;

    _ws = new WebSocket(url);
    _ws.binaryType = 'blob';

    _ws.onopen = () => {
      _frameCount = 0;
      _setWsStatus('live');
    };

    _ws.onmessage = (ev) => {
      const img = document.getElementById('preview-img');
      const ph  = document.getElementById('preview-placeholder');

      // Revoke the previous object URL to avoid memory leaks
      if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);

      img.src     = URL.createObjectURL(ev.data);
      img.style.display = 'block';
      ph.style.display  = 'none';

      _frameCount++;
      const now = new Date().toLocaleTimeString();
      document.getElementById('preview-count').textContent =
        `${_frameCount} frame${_frameCount !== 1 ? 's' : ''}`;
      document.getElementById('preview-overlay').textContent =
        `#${_frameCount} · ${now}`;
      if (_histEnabled) _drawHistogram(ev.data);
    };

    _ws.onerror = () => {
      setStatus('preview-status', 'WebSocket error — check server', true);
    };

    _ws.onclose = (ev) => {
      _ws = null;
      if (_reconnect && ev.code !== 1000) {
        // Abnormal close: schedule reconnect
        _setWsStatus('connecting');
        setStatus('preview-status', `Disconnected (code ${ev.code}) — reconnecting in 3 s…`);
        _reconnectTimer = setTimeout(_connectWs, 3000);
      } else if (!_reconnect) {
        // User stopped
        _setWsStatus('stopped');
      } else {
        // Normal close from server side — just reset UI
        _setWsStatus('stopped');
        document.getElementById('preview-start-btn').disabled = false;
        document.getElementById('preview-stop-btn').disabled  = true;
      }
    };
  }

  function _connectWs2() {
    if (_ws2) { _ws2.close(); _ws2 = null; }

    const exposure = parseFloat(document.getElementById('preview-exposure-b').value) || 2.0;
    const gain     = parseInt(document.getElementById('preview-gain-b').value, 10) || 100;
    const camIdx   = parseInt(document.getElementById('preview-cam-idx-b').value, 10) || 1;
    const proto    = location.protocol === 'https:' ? 'wss' : 'ws';
    const url      = `${proto}://${location.host}/ws/preview?exposure=${exposure}&gain=${gain}&camera_index=${camIdx}`;

    _ws2 = new WebSocket(url);
    _ws2.binaryType = 'blob';

    _ws2.onopen = () => { _frameCount2 = 0; };

    _ws2.onmessage = (ev) => {
      const img = document.getElementById('preview-img-b');
      const ph  = document.getElementById('preview-placeholder-b');
      if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
      img.src = URL.createObjectURL(ev.data);
      img.style.display = 'block';
      ph.style.display  = 'none';
      _frameCount2++;
      document.getElementById('preview-count-b').textContent =
        `${_frameCount2} frame${_frameCount2 !== 1 ? 's' : ''}`;
      document.getElementById('preview-overlay-b').textContent =
        `#${_frameCount2} · ${new Date().toLocaleTimeString()}`;
    };

    _ws2.onerror = () => {};  // silent — secondary panel

    _ws2.onclose = (ev) => {
      _ws2 = null;
      if (_reconnect2 && ev.code !== 1000 && _splitActive) {
        _reconnectTimer2 = setTimeout(_connectWs2, 3000);
      }
    };
  }

  /* ── Histogram ───────────────────────────────────────────────────────── */

  function previewHistToggle(enabled) {
    _histEnabled = enabled;
    const canvas = document.getElementById('preview-histogram');
    if (!enabled) {
      canvas.style.display = 'none';
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  async function _drawHistogram(blob) {
    if (_histDrawing) return;
    _histDrawing = true;
    try {
      const bitmap = await createImageBitmap(blob);
      // Decode into a small offscreen canvas for performance
      const dec = document.getElementById('preview-hist-decode');
      const DW = 160, DH = Math.max(1, Math.round(160 * bitmap.height / bitmap.width));
      dec.width = DW; dec.height = DH;
      const dctx = dec.getContext('2d');
      dctx.drawImage(bitmap, 0, 0, DW, DH);
      bitmap.close();

      const px = dctx.getImageData(0, 0, DW, DH).data;
      const bins = new Uint32Array(256);
      for (let i = 0; i < px.length; i += 4) {
        // ITU-R BT.601 luminance
        bins[Math.round(0.299 * px[i] + 0.587 * px[i + 1] + 0.114 * px[i + 2])]++;
      }

      const canvas = document.getElementById('preview-histogram');
      const CW = canvas.width, CH = canvas.height;
      canvas.style.display = '';
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, CW, CH);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, CW, CH);

      // Bars — log scale so dim stars don't vanish
      const peak = Math.max(1, ...bins);
      const logPeak = Math.log1p(peak);
      ctx.fillStyle = 'rgba(210,210,210,0.9)';
      const bw = CW / 256;
      for (let i = 0; i < 256; i++) {
        const h = Math.round(Math.log1p(bins[i]) / logPeak * (CH - 2));
        ctx.fillRect(i * bw, CH - h, Math.max(1, bw), h);
      }

      // Clipping indicators
      const total = DW * DH;
      const clipLo = (bins[0] / total * 100).toFixed(1);
      const clipHi = (bins[255] / total * 100).toFixed(1);
      ctx.font = '9px ui-monospace, monospace';
      ctx.fillStyle = 'rgba(120,180,255,0.9)';
      ctx.fillText(`${clipLo}%`, 3, CH - 3);
      ctx.fillStyle = 'rgba(255,140,100,0.9)';
      ctx.textAlign = 'right';
      ctx.fillText(`${clipHi}%`, CW - 3, CH - 3);
      ctx.textAlign = 'left';
    } finally {
      _histDrawing = false;
    }
  }

  /* ── Plate solving ───────────────────────────────────────────────────── */

  function _formatRA(hours) {
    const h = Math.floor(hours);
    const m = Math.floor((hours - h) * 60);
    const s = ((hours - h - m / 60) * 3600).toFixed(1);
    return `${h}h ${String(m).padStart(2, '0')}m ${String(s).padStart(4, '0')}s`;
  }

  function _formatDec(deg) {
    const sign = deg >= 0 ? '+' : '−';
    const abs = Math.abs(deg);
    const d = Math.floor(abs);
    const m = Math.floor((abs - d) * 60);
    const s = Math.round((abs - d - m / 60) * 3600);
    return `${sign}${d}° ${String(m).padStart(2, '0')}′ ${String(s).padStart(2, '0')}″`;
  }

  async function solveFrame() {
    const btn    = document.getElementById('solve-btn');
    const result = document.getElementById('solve-result');
    const exposure    = parseFloat(document.getElementById('preview-exposure').value) || 5.0;
    const gain        = parseInt(document.getElementById('preview-gain').value, 10) || 100;
    const camIdx      = parseInt(document.getElementById('preview-cam-idx-a').value, 10) || 0;

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Solving…';
    result.style.display = 'none';
    setStatus('preview-status', '');

    try {
      const data = await apiPost('/api/solver/solve', {
        exposure, gain, camera_index: camIdx,
      });
      if (data.success) {
        result.style.display = '';
        result.innerHTML =
          `RA: <b>${_formatRA(data.ra)}</b> &nbsp; Dec: <b>${_formatDec(data.dec)}</b>` +
          ` &nbsp; PA: ${data.pa.toFixed(1)}° &nbsp; ` +
          `<span style="color:var(--muted)">${data.solve_time_s}s</span>`;
      } else {
        setStatus('preview-status', `Solve failed: ${data.error || 'unknown'}`, true);
      }
    } catch (err) {
      setStatus('preview-status', `Solve error: ${err}`, true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Solve';
    }
  }

  /* ── Custom Targets ───────────────────────────────────────────────────── */

  const _TRACKING_LABEL = { sidereal: 'sidereal', lunar: 'lunar', satellite: 'sat' };

  function starItem(t) {
    const ra  = t.ra.toFixed(4) + ' h';
    const dec = (t.dec >= 0 ? '+' : '') + t.dec.toFixed(2) + '°';
    const mag = t.magnitude != null ? ` m${t.magnitude}` : '';
    const trk = t.tracking || 'sidereal';
    return `
      <div class="star-item"
           onclick="starSelect(${t.ra},${t.dec},'${escHtml(t.name)}','${escHtml(trk)}')">
        <span class="si-name">${escHtml(t.name)}</span>
        <span class="si-common">${escHtml(t.common_name || '')}${mag}</span>
        <span class="si-coords">${ra} ${dec}</span>
        <span class="tracking-badge tracking-${trk}">${_TRACKING_LABEL[trk] || trk}</span>
      </div>`;
  }

  async function loadStars() {
    const list = document.getElementById('stars-list');
    setStatus('stars-status', '');
    try {
      const targets = await (await fetch('/api/catalog/stars')).json();
      if (!targets.length) {
        setStatus('stars-status', 'stars.cfg not found or empty — add targets to stars.cfg in the repo root.');
        list.innerHTML = '';
        return;
      }
      list.innerHTML = targets.map(starItem).join('');
    } catch (err) {
      setStatus('stars-status', 'Could not load stars.cfg: ' + err, true);
    }
  }

  function starSelect(ra, dec, name, tracking) {
    document.getElementById('goto-ra').value  = ra.toFixed(4);
    document.getElementById('goto-dec').value = dec.toFixed(4);
    const q = document.getElementById('catalog-query');
    if (q) q.value = name;
    if (tracking !== 'sidereal') {
      setStatus('mount-status', `Note: ${name} uses ${tracking} tracking — set mount rate manually after slew.`);
    }
  }

  /* ── Catalog search ────────────────────────────────────────────────────── */

  let _catalogTimer = null;

  function catalogSearch() {
    clearTimeout(_catalogTimer);
    const q          = document.getElementById('catalog-query').value.trim();
    const observable = document.getElementById('catalog-observable')?.checked;
    const container  = document.getElementById('catalog-results');
    if (q.length < 1) { container.innerHTML = ''; return; }
    _catalogTimer = setTimeout(async () => {
      try {
        let url = `/api/catalog/search?q=${encodeURIComponent(q)}&limit=8`;
        if (observable) url += '&min_altitude=20';
        const items = await (await fetch(url)).json();
        if (!items.length) { container.innerHTML = '<div class="catalog-dropdown"><div class="catalog-item" style="color:var(--muted)">No results</div></div>'; return; }
        container.innerHTML = `<div class="catalog-dropdown">${
          items.map(it => {
            const altStr = it.altitude_deg !== null
              ? `<span class="ci-alt" style="font-size:0.72rem;color:${it.altitude_deg >= 20 ? 'var(--success)' : 'var(--warning)'}">↑${it.altitude_deg.toFixed(0)}°</span>`
              : '';
            return `
            <div class="catalog-item"
                 onclick="catalogSelect(${it.ra_hours},${it.dec_deg},'${escHtml(it.name)}')">
              <span class="ci-name">${escHtml(it.name)}</span>
              <span class="ci-common">${escHtml(it.common_name)}</span>
              <span class="ci-coords">${it.ra_hours.toFixed(3)}h ${it.dec_deg >= 0 ? '+' : ''}${it.dec_deg.toFixed(2)}°</span>
              ${altStr}
            </div>`;
          }).join('')
        }</div>`;
      } catch { container.innerHTML = ''; }
    }, 200);
  }

  function catalogSelect(ra, dec, name) {
    document.getElementById('goto-ra').value  = ra.toFixed(4);
    document.getElementById('goto-dec').value = dec.toFixed(4);
    document.getElementById('catalog-query').value = name;
    document.getElementById('catalog-results').innerHTML = '';
  }

  document.addEventListener('click', (ev) => {
    if (!ev.target.closest('#catalog-results') &&
        !ev.target.closest('#catalog-query')) {
      const c = document.getElementById('catalog-results');
      if (c) c.innerHTML = '';
    }
  });

  async function connectAll() {
    const btn = document.getElementById('connect-all-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Connecting…';

    try {
      const data = await apiPost('/api/session/connect');
      const section = document.getElementById('connect-status-section');
      const grid    = document.getElementById('connect-status-grid');
      section.style.display = '';

      grid.innerHTML = Object.entries(data).map(([device, info]) => {
        const ok   = info.status === 'ok';
        const dot  = ok ? 'dot-green' : 'dot-red';
        const msg  = ok ? 'Connected' : (info.error || 'Failed');
        return `
          <div class="param">
            <span class="param-label" style="display:flex;align-items:center;gap:0.4rem">
              <span class="dot ${dot}" style="width:7px;height:7px"></span>${escHtml(device)}
            </span>
            <span class="param-value" style="font-size:0.8rem">${escHtml(msg)}</span>
          </div>`;
      }).join('');

      const mountOk = data['mount']?.status === 'ok';
      const camOk   = data['camera']?.status === 'ok';
      _mountConnected = mountOk;

      if (mountOk) {
        document.getElementById('skyshot-dot').className = 'dot dot-yellow';
      }
      if (camOk) {
        _activeCameraName = 'ToupTek';
        document.getElementById('preview-camera-label').textContent = 'Camera: ToupTek';
      }

      await refreshMount();
      await refreshFocuser();
    } catch (err) {
      alert('Connect All failed: ' + err);
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'Connect All';
    }
  }

  /* ── Sky Shot ──────────────────────────────────────────────────────────── */

  let _skyshotWs = null;

  function updateElevationLabel() {
    document.getElementById('elevation-label').textContent =
      ' °  →  Dec ≈ ' + skyDec().toFixed(1) + '°';
  }

  function skyDec() {
    // Approximate: Dec = lat - (90 - elevation).
    // We don't know lat client-side, so just show the calculation hint.
    const el = parseFloat(document.getElementById('skyshot-elevation').value) || 80;
    return el - 90 + 50.3; // rough Usingen latitude placeholder
  }

  async function skyGoto() {
    const el  = parseFloat(document.getElementById('skyshot-elevation').value) || 80;
    const btn = document.getElementById('skyshot-goto-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Slewing…';
    setStatus('skyshot-status', '');
    try {
      const data = await (await fetch(`/api/mount/goto_sky?elevation=${el}`, { method: 'POST' })).json();
      if (data.error) throw new Error(JSON.stringify(data));
      document.getElementById('skyshot-ra').textContent  = data.ra.toFixed(4)  + ' h';
      document.getElementById('skyshot-dec').textContent = data.dec.toFixed(4) + ' °';
      document.getElementById('skyshot-dot').className = 'dot dot-green';
      document.getElementById('skyshot-frame').style.display = '';
      document.getElementById('skyshot-snap-btn').disabled = false;
      setStatus('skyshot-status', `Slewing to RA ${data.ra.toFixed(3)} h  Dec ${data.dec.toFixed(2)}° — wait for mount to settle`);
      await refreshMount();
    } catch (err) {
      setStatus('skyshot-status', 'GoTo sky failed: ' + err, true);
      document.getElementById('skyshot-dot').className = 'dot dot-red';
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'GoTo Sky';
    }
  }

  function skySnap() {
    if (_skyshotWs) { _skyshotWs.close(); _skyshotWs = null; }

    const btn = document.getElementById('skyshot-snap-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Snapping…';
    setStatus('skyshot-status', '');

    const exposure = parseFloat(document.getElementById('preview-exposure').value) || 2.0;
    const proto    = location.protocol === 'https:' ? 'wss' : 'ws';
    _skyshotWs = new WebSocket(`${proto}://${location.host}/ws/preview?exposure=${exposure}`);
    _skyshotWs.binaryType = 'blob';

    _skyshotWs.onmessage = (ev) => {
      const img = document.getElementById('skyshot-img');
      const ph  = document.getElementById('skyshot-placeholder');
      if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
      img.src = URL.createObjectURL(ev.data);
      img.style.display = 'block';
      ph.style.display  = 'none';
      document.getElementById('skyshot-snap-count').textContent = 'Frame captured';
      setStatus('skyshot-status', 'Frame captured successfully.');
      _skyshotWs.close();
      _skyshotWs = null;
    };

    _skyshotWs.onerror = () => {
      setStatus('skyshot-status', 'Snap failed — WebSocket error', true);
      btn.disabled  = false;
      btn.innerHTML = 'Snap';
    };

    _skyshotWs.onclose = () => {
      btn.disabled  = false;
      btn.innerHTML = 'Snap';
    };
  }

  async function skyPark() {
    const btn = document.getElementById('skyshot-park-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Parking…';
    try {
      await apiPost('/api/mount/park');
      setStatus('skyshot-status', 'Mount parked.');
      document.getElementById('skyshot-dot').className = 'dot dot-grey';
      document.getElementById('skyshot-snap-btn').disabled = true;
      await refreshMount();
    } catch (err) {
      setStatus('skyshot-status', 'Park failed: ' + err, true);
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'Park after Snap';
    }
  }

  /* ── init ──────────────────────────────────────────────────────────────── */
  updateElevationLabel();
  refreshMount();
  refreshFocuser();
  loadStars();
</script>

</body>
</html>
