# SmartTScope — installation config
# Copy this file to ~/.SmartTScope/config.toml and fill in your values.
# Environment variables override any setting defined here.

[observer]
lat = 0.0    # decimal degrees, north-positive  (e.g. 50.336 for Usingen, Hesse)
lon = 0.0    # decimal degrees, east-positive   (e.g. 8.533)
height_m = 0.0   # elevation above sea level, metres (optional; 0.0 if unknown; "alt_m" also accepted)
name = "Home"    # optional friendly label shown in the Confirm Time & Location panel (e.g. "Usingen, HE")

# ── Saved locations library (optional) ─────────────────────────────────────
# Each named site gets its own [locations.<name>] table — same table-of-tables
# convention as [cameras.<role>] / [telescopes.<name>] below. Recalled/edited
# from the "Confirm Time & Location" panel; never rewrites [observer] (Home).
# [locations.dark_sky_site]
# lat      = 49.912
# lon      = 8.111
# height_m = 410.0

[hardware]
# Use stable udev symlink names (won't shift like ttyUSB0/1/2 across reconnects).
# Leave empty ("") to fall back to simulator/mock — useful without hardware attached.
onstep_port      = ""   # e.g. "/dev/ttyUSB_ONSTEP0"
gps_port         = ""   # e.g. "/dev/ttyUSB_GPS0"          (future use)
dew_control_port = ""   # e.g. "/dev/ttyUSB_DEWCONTROL0"   (future use)

# ── Cameras ───────────────────────────────────────────────────────────────────
# Each role (main, guide, oag, …) gets its own [cameras.<role>] table.
# model        — SDK display-name substring, case-insensitive.
# camera_id    — optional USB serial number for unambiguous matching.
# backend      — "native" (ToupTek SDK) is the only supported value today.
# capture_mode — "snap" (single-frame) | "indi-stream-trigger" (stream+SW trigger)
# setup_profile— "default" | "indi"  (INDI-mode cameras need "indi" profile)
# startup_delay_s — seconds to wait after Open() before issuing commands (OAG/USB-hub cameras)
# prime_attempts  — take N throwaway frames on connect to flush sensor artefacts (0=disabled)
# gain / offset_lcg / offset_hcg — sensor defaults; offset prevents low-signal clipping to zero
# bit_depth    — 8 | 16

[cameras.main]
model         = "ATR585M"
backend       = "native"
capture_mode  = "indi-stream-trigger"
setup_profile = "indi"
gain          = 101
offset_lcg    = 150
offset_hcg    = 150
bit_depth     = 16

[cameras.guide]
model         = "GPCMOS02000KPA"
backend       = "native"
capture_mode  = "snap"
gain          = 101
offset_lcg    = 10
offset_hcg    = 10
bit_depth     = 16

# Uncomment the block below when the G3M678M is mounted on the OAG
# [cameras.oag]
# model             = "G3M678M"
# backend           = "native"
# capture_mode      = "indi-stream-trigger"
# setup_profile     = "indi"
# startup_delay_s   = 40
# prime_attempts    = 3
# prime_timeout_s   = 1.5
# prime_exposure_s  = 0.001
# gain              = 101
# offset_lcg        = 150
# offset_hcg        = 150
# bit_depth         = 16

# ── Camera serial numbers (optional, backward-compat) ─────────────────────────
# Only needed when using the legacy scalar cameras format (main = "G3M678M").
# With the [cameras.<role>] table format above, set camera_id inside each table
# instead.  Kept here so existing installs without table-format config still work.

[camera_serials]
G3M678M        = "tp-4-2-11-0547-14bc"
ATR585M        = "tp-4-1-10-0547-157c"
GPCMOS02000KPA = "tp-3-4-23-0547-1367"

# ── Filter wheel ──────────────────────────────────────────────────────────────
# ToupTek standalone filter wheel (enumerates on USB alongside the cameras).

[filter_wheel]
enabled            = false
backend            = "native"        # "native" = ToupTek SDK direct
model              = ""              # match by model, e.g. "FILTERWHEEL"
name               = ""              # or match by display name
wheel_id           = ""              # or pin the exact SDK device id
settle_s           = 1.5             # wait after a slot change, seconds
active_camera_role = "main"          # the camera behind the wheel

# ── Filter names (M10-014) ────────────────────────────────────────────────────
# 1-based wheel slot → filter name.  Use INDI-convention spellings so external
# tools (KStars/Ekos, ASTAP) agree: Luminance, Red, Green, Blue, H_Alpha,
# SII, OIII, LPR.  Unnamed slots display as "slot N".

[filters]
# 1 = "Luminance"
# 2 = "Red"
# 3 = "Green"
# 4 = "Blue"
# 5 = "H_Alpha"
# 6 = "OIII"
# 7 = "SII"

# ── Optical hardware inventory ────────────────────────────────────────────────
# Define each physical telescope once, then build optical trains from them.
# Reducer/Barlow factors are set per train, not per telescope.

[telescopes]

[telescopes.c8]
aperture_mm  = 203.2
focal_mm     = 2032.0
type         = "sct"          # sct | refractor | newt | rc
obstruction  = 0.36           # central obstruction as fraction of aperture

[telescopes.guide_scope]
aperture_mm  = 50.0
focal_mm     = 180.0
type         = "refractor"
obstruction  = 0.0

# ── Optical trains ────────────────────────────────────────────────────────────
# Each train binds a telescope to a camera role.
# reducer_factor: 1.0=none, 0.63=Celestron f/6.3 reducer, 2.0=Barlow 2×
# One telescope may appear in multiple trains (e.g. main + OAG both use "c8").

[optical_trains]

[optical_trains.main]
telescope           = "c8"
camera              = "main"        # camera role from [cameras]
reducer_factor      = 1.0           # native f/10; use 0.63 for Celestron f/6.3 reducer
focuser             = "onstep"      # "onstep" | "" (no focuser)
# pixel_scale_arcsec = 0.38         # optional override ONLY (M10-015): when omitted, the
#                                   # scale is derived from the camera model's pixel size
#                                   # (driver-reported when connected) × focal_mm × reducer,
#                                   # and scaled by the active binning at runtime
# M10-013: declared optical elements — name what is in this light path so the
# app can report the full configuration per camera. reducer_factor above stays
# the numeric authority for focal-length/pixel-scale math; mismatches between
# a declared element and the factor produce a startup warning.
filter_wheel        = ""            # "touptek" (links to [filter_wheel], must be enabled) | ""
reducer             = ""            # descriptive label, e.g. "celestron_f6.3"
barlow              = ""            # descriptive label, e.g. "2x"

[optical_trains.guide]
telescope      = "guide_scope"
camera         = "guide"
reducer_factor = 1.0
focuser        = ""
filter_wheel   = ""
reducer        = ""
barlow         = ""
# pixel_scale_arcsec = 3.32         # guide scope 50/180 + 2.9 µm sensor

[optical_trains.oag]
telescope      = "c8"          # OAG shares the main telescope beam
camera         = "oag"         # add "oag" to [cameras] when a third camera is connected
reducer_factor = 1.0
focuser        = "onstep"      # OAG shares main focuser
filter_wheel   = ""
reducer        = ""
barlow         = ""

# ── Time / location trust (M8-006..M8-009) ───────────────────────────────────
# M8-006: MasterSourceService selects master source in priority order:
#   GPS_FIX (gpsd) > NTP (timedatectl) > USER_CONFIRMED > FALLBACK (untrusted)
# FALLBACK does not unlock mount automation (raspberry_time_trust = NOT_TRUSTED).
# GPS port is configured under [hardware].gps_port above.
#
[time_location]
session_trust_expiry_minutes = 120   # how long USER_CONFIRMED/ONSTEP_COMPARISON trust lasts
persist_trust_across_restart = false # trust never survives a restart (enforced by design)

[astap]
path        = ""   # empty = auto-detect via PATH
catalog_dir = ""   # empty = auto-search standard locations

[plate_solve]
min_detected_stars_before_solve   = 15    # advisory star-count threshold (OPEN-003: revisit after real frames)
allow_astap_below_min_star_count  = true  # proceed even below threshold; gate failure is logged only

[click_to_center]
max_iterations                         = 5       # max centering attempts per click (REQ-CLICK-004)
center_tolerance_px                    = 20      # success when target within this many pixels of frame centre
max_single_move_px                     = 300     # safety clamp on any single move (pixels)
start_with_fraction_of_calculated_move = 0.5     # first-iteration damping; reduces overshoot
allow_when_tracking_off                = true    # permit centering even when sidereal tracking is disabled
center_rate_arcsec_per_sec             = 120.0   # mount center-rate in arcsec/s (OPEN-002: calibrate after first run)

[mount]
onstep_time_tolerance_s     = 10     # M8-008: max clock delta for VERIFIED (seconds)
onstep_location_tolerance_m = 100    # M8-008: max location delta for VERIFIED (metres)

[mount_limits]
min_alt_deg     = 10.0    # horizon clearance
max_alt_deg     = 88.0    # avoid zenith flip zone
ha_east_limit_h = -5.5    # negative = east of meridian
ha_west_limit_h = 0.333   # ~20 min past meridian

[session]
storage_dir          = ""      # where captured frames are saved; empty = system temp
command_history_dir  = ""      # JSONL command audit log dir; empty = ~/.SmartTScope/commands
log_dir              = ""      # per-section log files root; empty = ~/.SmartTScope/logs
stars_cfg            = ""      # path to custom target list; empty = ~/.SmartTScope/stars.cfg
horizon_dat          = ""      # path to KStars horizon export; empty = ~/.SmartTScope/horizon.dat
pixel_scale_arcsec   = 0.38   # arcsec per pixel at your focal length (C8 native = 0.38)

# ── Diagnostic frame storage (REQ-FRAME-001) ─────────────────────────────────

[diagnostic_frames]
enabled        = true
store_mode     = "debug_or_failure"   # always | debug_only | failure_only | debug_or_failure | off
retention_days = 2
frame_dir      = ""                   # empty = ~/.SmartTScope/diagnostic_frames/

# ── Optional external frame analyzer ─────────────────────────────────────────
# Set to the Python module name that provides analyze_frame().
# Leave empty (default) to use built-in analysis only.
# The module must be importable (pip-installed or on PYTHONPATH).
# Env var override: EXTERNAL_FRAME_ANALYZER_MODULE

[analysis]
external_frame_analyzer_module = ""

# ── Operation policy (REQ-GOTO-003) ──────────────────────────────────────────

[operation_policy]
allow_direct_radec_goto_without_raspberry_time_trust = false   # default: block GoTo when Pi time untrusted

# ── Collimation assistant ─────────────────────────────────────────────────────
# All values below show the defaults.  Uncomment and edit only what you need.

[collimation]
telescope_profile = "c8_f10"   # c8_f10 | c8_f10_atr585m | c8_f6_3 | c8_f20_barlow2x
camera_id         = "main"     # camera role from [cameras] section
mount_adapter     = "onstep"
focuser_adapter   = "onstep"

# Reference center: where the optical axis is in the image.
# Default (frame_center): uses the geometric frame center.
# Set source = "calibrated" and supply offsets once you have measured them.
[collimation.reference_center]
offset_x_px = 0.0           # positive = right of frame center
offset_y_px = 0.0           # positive = below frame center
source      = "frame_center" # "frame_center" | "calibrated"

[collimation.contradiction_detection]
enabled                               = true
stop_on_conflicting_indicators        = true
require_recenter_before_next_screw_hint = true
require_refocus_before_final_fine_hint  = true

# Daylight / mechanical alignment — disabled for MVP
[collimation.daylight_mechanical_alignment]
enabled = false

# Focuser settings for the collimation assistant
[collimation.focuser]
min_position               = 0
max_position               = 50000
increasing_value_direction = "clockwise"
final_approach_direction   = "clockwise"
defocus_direction          = "clockwise"
max_single_step            = 500
fine_step                  = 25
coarse_step                = 250

# Mount centering during collimation
[collimation.mount_centering]
method               = "pulse_guide"
max_pulse_ms         = 500
settle_ms            = 750
initial_tolerance_px = 50.0
rough_tolerance_px   = 20.0
fine_tolerance_px    = 5.0

# Rough collimation (defocused donut)
[collimation.rough_collimation]
target_donut_diameter_ratio_min = 0.25
target_donut_diameter_ratio_max = 0.50
good_error_ratio                = 0.02
fallback_error_ratio            = 0.05

# Fine collimation (Tri-Bahtinov)
[collimation.fine_collimation]
moving_window_frames   = 7
target_residual_px     = 2.0
poor_seeing_residual_px = 3.0

# ---------------------------------------------------------------------------
# Collimation frame archive (opt-in)
# Saves accepted donut/spike frames as FITS + JSON sidecar for offline replay.
# ---------------------------------------------------------------------------
[collimation.archive]
enabled                  = false
# archive_dir            = ""      # empty = ~/.SmartTScope/frame_archive
max_frames_per_session   = 50

# ---------------------------------------------------------------------------
# Guiding
# ---------------------------------------------------------------------------
[live_analysis]
# M10-003: per-camera setup FSM (runs while you confirm time/location).
# Frames are analyzed by the external SmartTScopeLiveAnalysis module, which
# recommends the next exposure/gain/offset; M10-005 applies those
# recommendations between TUNING frames, clamped to the bounds below.
enabled           = true
# Exposure used for the very first setup frame, seconds — the auto-tune loop
# adjusts it (within max/min_tuning_exposure_s) from the second frame onward.
setup_exposure_s  = 1.0
# Frames captured during TUNING before the star check starts
tuning_frames     = 3
# Max additional frames the STAR_CHECK phase tries before reporting DEGRADED
star_check_frames = 5
# Minimum detected stars for a camera to pass STAR_CHECK
star_count_min    = 3

# M10-005: clamp bounds for the auto-tune loop's applied exposure/gain/offset —
# the module's recommendation is never applied outside these ranges.
max_tuning_exposure_s   = 5.0     # seconds
min_tuning_exposure_s   = 0.05    # seconds
tuning_gain_min         = 100
tuning_gain_max         = 3200
tuning_offset_min       = 0
tuning_offset_max       = 200
# App-side safety ceiling: force a step-down when a frame's 99.5th-percentile
# signal exceeds this fraction of full scale, regardless of what the module
# recommended — until it ships its own histogram-ceiling parameter (LA-REQ-1
# draft, see SYNC.md), this local ceiling is the only clip guard in place.
histogram_ceiling_frac  = 0.70

[guiding]
# Primary guide source role: "guide" or "oag"
primary_role              = "guide"
# Fall back to the other guide role after this many consecutive bad frames
allow_fallback            = true
fallback_after_bad_frames = 3
# Reject frames older than this (seconds)
max_frame_age_s           = 2.0
# Centroid ROI radius in pixels around the brightest point
centroid_roi_px           = 32
# Minimum peak SNR to accept a star frame
min_peak_snr              = 5.0
# Fraction of dtype max that counts as saturated
saturation_fraction       = 0.98
# true = compute corrections but do NOT send pulses to the mount (safe default)
# Set to false only after validating measure-only output on real hardware
measure_only              = true
