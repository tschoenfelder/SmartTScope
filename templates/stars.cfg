# SmartTScope — custom target list
# Copy this file to ~/.SmartTScope/stars.cfg and add your own targets.
# Format: TOML  (https://toml.io)
# The server reloads this file on every request — no restart needed.
#
# Fields:
#   name        — short identifier used in GoTo and log (required)
#   common_name — display name (optional)
#   ra          — right ascension in decimal hours (required)
#   dec         — declination in decimal degrees, north-positive (required)
#   type        — star | nebula | galaxy | cluster | planet | satellite | comet
#   tracking    — sidereal | lunar | satellite
#   magnitude   — visual magnitude (optional, used for brightness filtering)

# ── Alignment stars (examples — add your own) ─────────────────────────────────

[[targets]]
name        = "Vega"
common_name = "Alpha Lyrae"
ra          = 18.6156
dec         = 38.7836
type        = "star"
tracking    = "sidereal"
magnitude   = 0.03

[[targets]]
name        = "Arcturus"
common_name = "Alpha Bootis"
ra          = 14.2610
dec         = 19.1822
type        = "star"
tracking    = "sidereal"
magnitude   = -0.05

[[targets]]
name        = "Polaris"
common_name = "North Star"
ra          = 2.5302
dec         = 89.2641
type        = "star"
tracking    = "sidereal"
magnitude   = 1.98

# ── Deep-sky objects (examples) ───────────────────────────────────────────────

[[targets]]
name        = "NGC 7000"
common_name = "North America Nebula"
ra          = 20.9900
dec         = 44.5300
type        = "nebula"
tracking    = "sidereal"
magnitude   = 4.0

# ── Solar system (update coords from Stellarium or JPL Horizons) ──────────────

[[targets]]
name        = "Moon"
common_name = "Moon (coords placeholder — update from Stellarium or JPL Horizons)"
ra          = 8.0000
dec         = 20.0000
type        = "satellite"
tracking    = "lunar"
magnitude   = -12.7
